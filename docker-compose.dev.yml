services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: anvil
    restart: unless-stopped
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "chain-id"]
      interval: 5s
      timeout: 5s
      retries: 10

  deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: deployer
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - ../blockchain:/blockchain
    working_dir: /blockchain
    environment:
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    command: >
      sh -c "
      forge script script/DeployMockUSDC.s.sol:DeployMockUSDC --rpc-url http://anvil:8545/ --private-key $$PRIVATE_KEY --broadcast &&
      forge script script/Deploy.s.sol --rpc-url http://anvil:8545/ --private-key $$PRIVATE_KEY --broadcast
      "

  backend:
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      RPC_URL: "http://anvil:8545"
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    volumes:
      - ./:/app
      - ../blockchain/out:/blockchain/out
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
