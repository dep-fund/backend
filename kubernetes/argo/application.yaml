apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: depfund-backend
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: backend=us-central1-docker.pkg.dev/depfund-498022-d7/depfund/backend
    argocd-image-updater.argoproj.io/backend.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dep-fund/backend
    targetRevision: main
    path: kubernetes
    kustomize:
      namePrefix: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: depfund
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
