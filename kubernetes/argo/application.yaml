apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: depfund-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dep-fund/backend
    targetRevision: main
    path: kubernetes
    kustomize:
      namePrefix: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: depfund
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
