apiVersion: batch/v1
kind: CronJob
metadata:
  name: depfund-backup
  namespace: depfund
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: google/cloud-sdk:alpine
              command:
                - /bin/sh
                - -ec
                - |
                  SENDER_EMAIL="depfund.soporte@gmail.com"
                  NOTIFY_EMAIL="${BACKUP_NOTIFY_EMAIL:-depfund.soporte@gmail.com}"

                  notify() {
                    local status="$1" msg="$2"
                    curl --url 'smtps://smtp.gmail.com:465' --ssl-reqd \
                      --mail-from "$SENDER_EMAIL" --mail-rcpt "$NOTIFY_EMAIL" \
                      --user "$SENDER_EMAIL:$SENDER_PASSWORD" \
                      -T <(printf "From: %s\nTo: %s\nSubject: [DepFund] Backup %s\n\n%s\n" \
                        "$SENDER_EMAIL" "$NOTIFY_EMAIL" "$status" "$msg")
                  }

                  ERRORS=""

                  echo "--- Instalando dependencias ---"
                  apk add --no-cache postgresql16-client curl jq

                  echo "--- PostgreSQL Dump ---"
                  DUMP_FILE="/tmp/depfund_db_$(date +%Y%m%d_%H%M%S).dump"
                  PGPASSWORD=$PGPASSWORD pg_dump \
                    -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDB \
                    --no-owner --no-acl \
                    -F c \
                    > "$DUMP_FILE" || ERRORS="${ERRORS}DB dump failed. "

                  DUMP_SIZE=$(du -sh "$DUMP_FILE" | cut -f1)
                  echo "Subiendo DB dump a gs://$BUCKET/db/"
                  gsutil cp "$DUMP_FILE" gs://$BUCKET/db/ || ERRORS="${ERRORS}DB upload failed. "
                  rm -f "$DUMP_FILE"

                  echo "--- Cloudinary Assets Backup ---"
                  if [ -n "${CLOUDINARY_CLOUD_NAME:-}" ] && [ -n "${CLOUDINARY_API_KEY:-}" ] && [ -n "${CLOUDINARY_API_SECRET:-}" ]; then
                    CLOUD_DIR="/tmp/cloudinary_$(date +%Y%m%d_%H%M%S)"
                    mkdir -p "$CLOUD_DIR"

                    echo "Listando recursos de Cloudinary..."
                    curl -s -u "${CLOUDINARY_API_KEY}:${CLOUDINARY_API_SECRET}" \
                      "https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/resources/image?max_results=500" \
                      | jq -r '.resources[] | .secure_url' > /tmp/cloudinary_urls.txt

                    TOTAL=$(wc -l < /tmp/cloudinary_urls.txt)
                    COUNT=0
                    echo "Descargando $TOTAL imagenes..."
                    while IFS= read -r url; do
                      filename="$(basename "${url%%\?*}")"
                      curl -s -o "${CLOUD_DIR}/${filename}" "$url" || ERRORS="${ERRORS}Cloudinary download failed for $filename. "
                      COUNT=$((COUNT + 1))
                    done < /tmp/cloudinary_urls.txt

                    echo "Comprimiendo y subiendo a GCS..."
                    tar -czf /tmp/cloudinary.tgz -C "$CLOUD_DIR" .
                    gsutil cp /tmp/cloudinary.tgz gs://$BUCKET/cloudinary/backup_$(date +%Y%m%d).tgz || ERRORS="${ERRORS}Cloudinary upload failed. "
                    rm -rf "$CLOUD_DIR" /tmp/cloudinary_urls.txt /tmp/cloudinary.tgz
                  else
                    echo "Cloudinary no configurado, skipping assets"
                  fi

                  echo "--- Limpiando ---"
                  if [ -z "$ERRORS" ]; then
                    notify "Exitoso" "Backup completado exitosamente.\nFecha: $(date)\nDB: ${DUMP_SIZE}"
                    echo "Backup completado: $(date)"
                  else
                    notify "Fallos" "Backup con errores:\n${ERRORS}"
                    echo "Backup con errores: ${ERRORS}"
                  fi
              env:
                - name: PGHOST
                  value: "postgres"
                - name: PGPORT
                  value: "5432"
                - name: PGDB
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_PASSWORD
                - name: BUCKET
                  value: "prod-depfund-backups"
                - name: BACKUP_NOTIFY_EMAIL
                  valueFrom:
                    configMapKeyRef:
                      name: depfund-config
                      key: BACKUP_NOTIFY_EMAIL
                - name: SENDER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: SENDER_PASSWORD
                - name: CLOUDINARY_CLOUD_NAME
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: CLOUDINARY_CLOUD_NAME
                - name: CLOUDINARY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: CLOUDINARY_API_KEY
                - name: CLOUDINARY_API_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: CLOUDINARY_API_SECRET
              resources:
                requests:
                  cpu: "300m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1024Mi"
