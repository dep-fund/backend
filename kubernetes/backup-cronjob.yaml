apiVersion: batch/v1
kind: CronJob
metadata:
  name: depfund-backup
  namespace: depfund
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -ec
                - |
                  SENDER_EMAIL="depfund.soporte@gmail.com"
                  NOTIFY_EMAIL="${BACKUP_NOTIFY_EMAIL:-depfund.soporte@gmail.com}"

                  notify() {
                    local status="$1" msg="$2"
                    curl --url 'smtps://smtp.gmail.com:465' --ssl-reqd \
                      --mail-from "$SENDER_EMAIL" --mail-rcpt "$NOTIFY_EMAIL" \
                      --user "$SENDER_EMAIL:$SENDER_PASSWORD" \
                      -T <(printf "From: %s\nTo: %s\nSubject: [DepFund] Backup %s\n\n%s\n" \
                        "$SENDER_EMAIL" "$NOTIFY_EMAIL" "$status" "$msg")
                  }

                  echo "--- Instalando dependencias ---"
                  apk add --no-cache curl coreutils google-cloud-sdk

                  echo "--- PostgreSQL Dump ---"
                  DUMP_FILE="/tmp/depfund_db_$(date +%Y%m%d_%H%M%S).dump"
                  PGPASSWORD=$PGPASSWORD pg_dump \
                    -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDB \
                    --no-owner --no-acl \
                    -F c \
                    > "$DUMP_FILE"

                  DUMP_SIZE=$(du -sh "$DUMP_FILE" | cut -f1)

                  echo "--- Subiendo a GCS ---"
                  gsutil cp "$DUMP_FILE" gs://$BUCKET/db/

                  echo "--- Limpiando ---"
                  rm -f "$DUMP_FILE"

                  notify "Exitoso" "Backup completado exitosamente.\nFecha: $(date)\nTamaño: ${DUMP_SIZE}\nBucket: gs://${BUCKET}/db/"
                  echo "Backup completado: $(date)"
              env:
                - name: PGHOST
                  value: "ep-square-hill-an7t5zyb-pooler.c-6.us-east-1.aws.neon.tech"
                - name: PGPORT
                  value: "5432"
                - name: PGDB
                  valueFrom:
                    configMapKeyRef:
                      name: depfund-config
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_PASSWORD
                - name: BUCKET
                  value: "prod-depfund-backups"
                - name: BACKUP_NOTIFY_EMAIL
                  valueFrom:
                    configMapKeyRef:
                      name: depfund-config
                      key: BACKUP_NOTIFY_EMAIL
                - name: SENDER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: SENDER_PASSWORD
              resources:
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
