apiVersion: batch/v1
kind: CronJob
metadata:
  name: depfund-backup
  namespace: depfund
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  echo "Backup iniciado: $(date)"
                  
                  echo "--- PostgreSQL Dump ---"
                  PGPASSWORD=$PGPASSWORD pg_dump \
                    -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDB \
                    --no-owner --no-acl \
                    -F c \
                    > /tmp/depfund_db_$(date +%Y%m%d_%H%M%S).dump
                  
                  echo "--- Subiendo a GCS ---"
                  gsutil cp /tmp/depfund_db_*.dump gs://$BUCKET/db/
                  
                  echo "--- Limpiando ---"
                  rm -f /tmp/depfund_db_*.dump
                  echo "Backup completado: $(date)"
              env:
                - name: PGHOST
                  value: "ep-square-hill-an7t5zyb-pooler.c-6.us-east-1.aws.neon.tech"
                - name: PGPORT
                  value: "5432"
                - name: PGDB
                  valueFrom:
                    configMapKeyRef:
                      name: depfund-config
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: depfund-secrets
                      key: POSTGRES_PASSWORD
                - name: BUCKET
                  value: "prod-depfund-backups"
              resources:
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
