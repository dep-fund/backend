name: depfund

secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_db:
    file: ./secrets/postgres_db.txt
  secret_key:
    file: ./secrets/secret_key.txt
  admin_secret_key:
    file: ./secrets/admin_secret_key.txt
  google_client_id:
    file: ./secrets/google_client_id.txt
  google_client_secret:
    file: ./secrets/google_client_secret.txt
  google_redirect_uri:
    file: ./secrets/google_redirect_uri.txt

services:
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - depfund-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/postgres_user) -d $(cat /run/secrets/postgres_db)"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depfund-backend
    restart: unless-stopped
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - secret_key
      - admin_secret_key
      - google_client_id
      - google_client_secret
      - google_redirect_uri
    environment:
      IN_DOCKER: "1"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  depfund-pgdata: