name: depfund

secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_db:
    file: ./secrets/postgres_db.txt
  secret_key:
    file: ./secrets/secret_key.txt
  admin_secret_key:
    file: ./secrets/admin_secret_key.txt
  google_client_id:
    file: ./secrets/google_client_id.txt
  google_client_secret:
    file: ./secrets/google_client_secret.txt
  google_redirect_uri:
    file: ./secrets/google_redirect_uri.txt
  sender_password:
    file: ./secrets/sender_password.txt
  cloudinary_cloud_name:
    file: ./secrets/cloudinary_cloud_name.txt
  cloudinary_api_key:
    file: ./secrets/cloudinary_api_key.txt
  cloudinary_api_secret:
    file: ./secrets/cloudinary_api_secret.txt
  deployer_private_key:
    file: ./secrets/deployer_private_key.txt

services:
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - depfund-pgdata:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    command:
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/postgres_user) -d $(cat /run/secrets/postgres_db)"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@db:5432/depfund?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

    
  db-test:
    image: postgres:16
    container_name: db-test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: depfund_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d depfund_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depfund-backend
    restart: unless-stopped
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - secret_key
      - admin_secret_key
      - google_client_id
      - google_client_secret
      - google_redirect_uri
      - sender_password
      - cloudinary_cloud_name
      - cloudinary_api_key
      - cloudinary_api_secret
      - deployer_private_key
    environment:
      IN_DOCKER: "1"
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SENDER_EMAIL: depfund.soporte@gmail.com
      FRONTEND_URL: "http://localhost:5173"
      BACKOFFICE_URL: "http://localhost:5175"
      RPC_URL: ${RPC_URL:-https://base-sepolia.g.alchemy.com/v2/2Fu8fL0AXhGA4xO9c9TtD}
      FACTORY_ADDRESS: "0x72a804e91730D12221d99f6FB907682c932893a4"
      MARKETPLACE_ADDRESS: "0x2292E004e119b4Ec83bc689479EB9bF475AaFa0B"
      USDC_ADDRESS: "0x35ec429d8a88Dc666921AB7fE97e379Cd980F84E"
      TREASURY_ADDRESS: "0x2560d5b0CDe93D618425FadfC9F5511e8730Af90"
      PLATFORM_ADDRESS: "0x2560d5b0CDe93D618425FadfC9F5511e8730Af90"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  depfund-pgdata: