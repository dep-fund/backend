name: Deploy to GKE

on:
  workflow_run:
    workflows: ["Build & Push"]
    types:
      - completed
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  CLUSTER_NAME: prod-depfund-cluster
  CLUSTER_LOCATION: us-central1
  NAMESPACE: depfund
  TF_DIR: infrastructure/environments/prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.x

      - name: Init Terraform
        run: tofu -chdir=$TF_DIR init

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Create namespace if needed
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tag from latest build
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/depfund/backend:$SHA_SHORT"
          sed -i "s|image: .*/depfund/backend:latest|image: $IMAGE|g" kubernetes/deployment.yaml
          echo "Using image: $IMAGE"

      - name: Inject secrets into cluster
        run: |
          kubectl create secret generic depfund-secrets \
            --namespace $NAMESPACE \
            --dry-run=client -o yaml \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=ADMIN_SECRET_KEY="${{ secrets.ADMIN_SECRET_KEY }}" \
            --from-literal=SENDER_PASSWORD="${{ secrets.SENDER_PASSWORD }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            --from-literal=CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            --from-literal=CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            --from-literal=DEPLOYER_PRIVATE_KEY="${{ secrets.DEPLOYER_PRIVATE_KEY }}" \
            | kubectl apply -f -

      - name: Remove legacy ingress (now managed by Terraform)
        run: |
          kubectl delete ingress depfund-ingress -n $NAMESPACE --ignore-not-found

      - name: Update ConfigMap with LB IP and Cloud SQL
        run: |
          LB_IP=$(gcloud compute addresses describe prod-depfund-ingress-ip \
            --global --format="value(address)" 2>/dev/null || echo "PENDING")
          DB_IP=$(tofu -chdir=$TF_DIR output -raw cloudsql_private_ip 2>/dev/null || echo "PENDING")
          sed -i "s/LOAD_BALANCER_IP/$LB_IP/g" kubernetes/configmap.yaml
          sed -i "s/CLOUDSQL_PRIVATE_IP/$DB_IP/g" kubernetes/configmap.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl apply -f kubernetes/backup-cronjob.yaml

      - name: Resolve NEG ID and sync Terraform LB
        run: |
          NEG_NAME=$(kubectl get svc depfund-backend -n $NAMESPACE \
            -o jsonpath='{.metadata.annotations.cloud\.google\.com/neg-status}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['8000'])" 2>/dev/null || true)

          if [ -n "$NEG_NAME" ]; then
            NEG_ID=$(gcloud compute network-endpoint-groups describe "$NEG_NAME" \
              --region=$CLUSTER_LOCATION --format="value(selfLink)")
            echo "NEG ID: $NEG_ID"
            sed -i '/^backend_neg_id/d' $TF_DIR/terraform.tfvars
            echo "backend_neg_id = \"$NEG_ID\"" >> $TF_DIR/terraform.tfvars
            tofu -chdir=$TF_DIR apply -auto-approve
          else
            echo "NEG not ready yet, skipping Terraform sync"
          fi

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/depfund-backend -n $NAMESPACE --timeout=5m

      - name: Check health
        run: |
          echo "Waiting for load balancer..."
          sleep 30
          echo "Run 'tofu output lb_ip_address' from $TF_DIR to get the LB IP"
          curl -sI "http://$(tofu -chdir=$TF_DIR output -raw lb_ip_address)/health" || echo "Health check failed (may still be provisioning)"
