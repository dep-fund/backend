apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: depfund-loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.28.0
    chart: loki
    helm:
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2025-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            allow_structured_metadata: false

        write:
          replicas: 0
        read:
          replicas: 0
        backend:
          replicas: 0

        singleBinary:
          replicas: 1
          persistence:
            accessModes:
              - ReadWriteOnce
            size: 10Gi
            storageClassName: standard-rwo
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"

        gateway:
          enabled: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

        monitoring:
          dashboards:
            enabled: false
          rules:
            enabled: false
          serviceMonitor:
            enabled: true
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false

        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
