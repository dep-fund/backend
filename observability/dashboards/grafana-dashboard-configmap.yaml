apiVersion: v1
kind: ConfigMap
metadata:
  name: depfund-backend-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  depfund-backend.json: |
    {
      "title": "DepFund Backend",
      "uid": "depfund-backend",
      "tags": ["depfund", "backend"],
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "editable": true,
      "panels": [
        {
          "title": "Requests per second",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"depfund-backend\"}[5m]))",
              "legendFormat": "RPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "fixed", "fixedColor": "blue"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            }
          }
        },
        {
          "title": "Error rate (5xx)",
          "type": "stat",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "(sum(rate(http_requests_total{job=\"depfund-backend\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"depfund-backend\"}[5m])) * 100) or 0",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 1},
                {"color": "red", "value": 5}
              ]}
            }
          }
        },
        {
          "title": "Latency P99",
          "type": "stat",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"depfund-backend\"}[5m])) by (le))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 0.5},
                {"color": "red", "value": 1}
              ]}
            }
          }
        },
        {
          "title": "Latency P95",
          "type": "stat",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"depfund-backend\"}[5m])) by (le))",
              "legendFormat": "P95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 0.3},
                {"color": "red", "value": 0.8}
              ]}
            }
          }
        },
        {
          "title": "Total RPS",
          "type": "stat",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"depfund-backend\"}[5m]))",
              "legendFormat": "Total RPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "fixed", "fixedColor": "blue"}
            }
          }
        },
        {
          "title": "Top 10 endpoints by RPS",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 4, "w": 8, "h": 8},
          "targets": [
            {
              "expr": "topk(10, sum(rate(http_requests_total{job=\"depfund-backend\"}[5m])) by (path))",
              "legendFormat": "{{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Latency P50/P95/P99 (5m window)",
          "type": "timeseries",
          "gridPos": {"x": 8, "y": 4, "w": 16, "h": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"depfund-backend\"}[5m])) by (le))",
              "legendFormat": "P99"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"depfund-backend\"}[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"depfund-backend\"}[5m])) by (le))",
              "legendFormat": "P50"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Requests by status code",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"depfund-backend\",status=~\"2..\"}[5m])) by (status)",
              "legendFormat": "2xx"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"depfund-backend\",status=~\"3..\"}[5m])) by (status)",
              "legendFormat": "3xx"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"depfund-backend\",status=~\"4..\"}[5m])) by (status)",
              "legendFormat": "4xx"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"depfund-backend\",status=~\"5..\"}[5m])) by (status)",
              "legendFormat": "5xx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Error rate by endpoint",
          "type": "table",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "(sum(rate(http_requests_total{job=\"depfund-backend\",status=~\"5..\"}[5m])) by (path) / sum(rate(http_requests_total{job=\"depfund-backend\"}[5m])) by (path) * 100) or 0",
              "legendFormat": "{{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 1},
                {"color": "red", "value": 5}
              ]},
              "custom": {"displayMode": "color-background"}
            }
          },
          "transformations": [
            {"id": "organize", "options": {"indexByName": {}, "renameByName": {"Value #A": "Error %"}}}
          ]
        },
        {
          "title": "Backend logs (Loki)",
          "type": "logs",
          "gridPos": {"x": 0, "y": 20, "w": 24, "h": 8},
          "targets": [
            {
              "expr": "{app=\"depfund-backend\"}",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "datasource": "Loki"
        }
      ]
    }
  postgresql.json: |
    {
      "title": "DepFund PostgreSQL",
      "uid": "depfund-postgresql",
      "tags": ["depfund", "postgresql"],
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "editable": true,
      "panels": [
        {
          "title": "Uptime",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "pg_up{job=\"postgres-exporter\"}",
              "legendFormat": "Up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "red", "value": null},
                {"color": "green", "value": 1}
              ]}
            }
          }
        },
        {
          "title": "Active connections",
          "type": "stat",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count{job=\"postgres-exporter\"})",
              "legendFormat": "Connections"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 50},
                {"color": "red", "value": 80}
              ]}
            }
          }
        },
        {
          "title": "Cache hit ratio",
          "type": "stat",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\",datname=\"neondb\"}[5m])) / (sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\",datname=\"neondb\"}[5m])) + sum(rate(pg_stat_database_blks_read{job=\"postgres-exporter\",datname=\"neondb\"}[5m]))) * 100",
              "legendFormat": "Hit ratio"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "red", "value": null},
                {"color": "orange", "value": 90},
                {"color": "green", "value": 99}
              ]}
            }
          }
        },
        {
          "title": "TPS",
          "type": "stat",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_xact_commit{job=\"postgres-exporter\",datname=\"neondb\"}[5m]))",
              "legendFormat": "TPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "color": {"mode": "fixed", "fixedColor": "blue"}
            }
          }
        },
        {
          "title": "Deadlocks",
          "type": "stat",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_deadlocks{job=\"postgres-exporter\"}[5m]))",
              "legendFormat": "Deadlocks"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "red", "value": 0.001}
              ]}
            }
          }
        },
        {
          "title": "Database size",
          "type": "stat",
          "gridPos": {"x": 20, "y": 0, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "max(pg_database_size_bytes{job=\"postgres-exporter\",datname=\"neondb\"})",
              "legendFormat": "Size"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "fixed", "fixedColor": "blue"}
            }
          }
        },
        {
          "title": "Connections by state",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 5, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count{job=\"postgres-exporter\"}) by (state)",
              "legendFormat": "{{state}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Transactions per second",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 5, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(pg_stat_database_xact_commit{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Commits"
            },
            {
              "expr": "rate(pg_stat_database_xact_rollback{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Rollbacks"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Rows operations",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 13, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(pg_stat_database_tup_fetched{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Fetched"
            },
            {
              "expr": "rate(pg_stat_database_tup_inserted{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Inserted"
            },
            {
              "expr": "rate(pg_stat_database_tup_updated{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Updated"
            },
            {
              "expr": "rate(pg_stat_database_tup_deleted{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Deleted"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Cache hit ratio over time",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 13, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "(sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\",datname=\"neondb\"}[5m])) / (sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\",datname=\"neondb\"}[5m])) + sum(rate(pg_stat_database_blks_read{job=\"postgres-exporter\",datname=\"neondb\"}[5m])))) * 100",
              "legendFormat": "Cache hit %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "red", "value": null},
                {"color": "orange", "value": 90},
                {"color": "green", "value": 99}
              ]}
            }
          }
        },
        {
          "title": "Top 10 tables by size",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 21, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "topk(10, pg_stat_user_tables_table_size_bytes{job=\"postgres-exporter\"})",
              "legendFormat": "{{relname}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Top 10 tables by dead tuples",
          "type": "bargauge",
          "gridPos": {"x": 12, "y": 21, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "topk(10, pg_stat_user_tables_n_dead_tup{job=\"postgres-exporter\"})",
              "legendFormat": "{{relname}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Blocks hit vs read",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 29, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(pg_stat_database_blks_hit{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Blocks hit"
            },
            {
              "expr": "rate(pg_stat_database_blks_read{job=\"postgres-exporter\",datname=\"neondb\"}[5m])",
              "legendFormat": "Blocks read"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "WAL size",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 29, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "pg_wal_size_bytes{job=\"postgres-exporter\"}",
              "legendFormat": "WAL size"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "PostgreSQL logs (Loki)",
          "type": "logs",
          "gridPos": {"x": 0, "y": 37, "w": 24, "h": 8},
          "targets": [
            {
              "expr": "{namespace=\"depfund\",container=\"postgres\"}",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "datasource": "Loki"
        }
      ]
    }
