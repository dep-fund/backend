apiVersion: v1
kind: ConfigMap
metadata:
  name: depfund-backend-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  depfund-backend.json: |
    {
      "title": "DepFund Backend",
      "uid": "depfund-backend",
      "tags": ["depfund", "backend"],
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "editable": true,
      "panels": [
        {
          "title": "Requests per second",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\"}[5m]))",
              "legendFormat": "RPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "fixed", "fixedColor": "blue"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            }
          }
        },
        {
          "title": "Error rate (5xx)",
          "type": "stat",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=~\".*depfund.*backend.*\"}[5m])) * 100",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 1},
                {"color": "red", "value": 5}
              ]}
            }
          }
        },
        {
          "title": "Latency P99",
          "type": "stat",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\".*depfund.*backend.*\"}[5m])) by (le))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 0.5},
                {"color": "red", "value": 1}
              ]}
            }
          }
        },
        {
          "title": "Latency P95",
          "type": "stat",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\".*depfund.*backend.*\"}[5m])) by (le))",
              "legendFormat": "P95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 0.3},
                {"color": "red", "value": 0.8}
              ]}
            }
          }
        },
        {
          "title": "Total RPS",
          "type": "stat",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\"}[5m]))",
              "legendFormat": "Total RPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "fixed", "fixedColor": "blue"}
            }
          }
        },
        {
          "title": "Top 10 endpoints by RPS",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 4, "w": 8, "h": 8},
          "targets": [
            {
              "expr": "topk(10, sum(rate(http_requests_total{job=~\".*depfund.*backend.*\"}[5m])) by (path))",
              "legendFormat": "{{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Latency P50/P95/P99 (5m window)",
          "type": "timeseries",
          "gridPos": {"x": 8, "y": 4, "w": 16, "h": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\".*depfund.*backend.*\"}[5m])) by (le))",
              "legendFormat": "P99"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\".*depfund.*backend.*\"}[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=~\".*depfund.*backend.*\"}[5m])) by (le))",
              "legendFormat": "P50"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Requests by status code",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\",status=~\"2..\"}[5m])) by (status)",
              "legendFormat": "2xx"
            },
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\",status=~\"3..\"}[5m])) by (status)",
              "legendFormat": "3xx"
            },
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\",status=~\"4..\"}[5m])) by (status)",
              "legendFormat": "4xx"
            },
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\",status=~\"5..\"}[5m])) by (status)",
              "legendFormat": "5xx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Error rate by endpoint",
          "type": "table",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\".*depfund.*backend.*\",status=~\"5..\"}[5m])) by (path) / sum(rate(http_requests_total{job=~\".*depfund.*backend.*\"}[5m])) by (path) * 100",
              "legendFormat": "{{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 1},
                {"color": "red", "value": 5}
              ]},
              "custom": {"displayMode": "color-background"}
            }
          },
          "transformations": [
            {"id": "organize", "options": {"indexByName": {}, "renameByName": {"Value #A": "Error %"}}}
          ]
        },
        {
          "title": "Error logs (Loki)",
          "type": "logs",
          "gridPos": {"x": 0, "y": 20, "w": 24, "h": 8},
          "targets": [
            {
              "expr": "{app=~\".*depfund.*backend.*\"} |= \"error\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "datasource": "Loki"
        }
      ]
    }
  postgresql.json: |
    {
      "title": "DepFund PostgreSQL",
      "uid": "depfund-postgresql",
      "tags": ["depfund", "postgresql"],
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "editable": true,
      "panels": [
        {
          "title": "Active connections",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count{job=\"postgres-exporter\"})",
              "legendFormat": "Connections"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "orange", "value": 50},
                {"color": "red", "value": 80}
              ]}
            }
          }
        },
        {
          "title": "Cache hit ratio",
          "type": "stat",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\"}[5m])) / (sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\"}[5m])) + sum(rate(pg_stat_database_blks_read{job=\"postgres-exporter\"}[5m]))) * 100",
              "legendFormat": "Hit ratio"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "red", "value": null},
                {"color": "orange", "value": 90},
                {"color": "green", "value": 99}
              ]}
            }
          }
        },
        {
          "title": "Transactions per second",
          "type": "stat",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_xact_commit{job=\"postgres-exporter\"}[5m])) + sum(rate(pg_stat_database_xact_rollback{job=\"postgres-exporter\"}[5m]))",
              "legendFormat": "TPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "color": {"mode": "fixed", "fixedColor": "blue"}
            }
          }
        },
        {
          "title": "Deadlocks",
          "type": "stat",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_deadlocks{job=\"postgres-exporter\"}[5m]))",
              "legendFormat": "Deadlocks/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "red", "value": 0.1}
              ]}
            }
          }
        },
        {
          "title": "Database size",
          "type": "stat",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "targets": [
            {
              "expr": "max(pg_database_size_bytes{job=\"postgres-exporter\"})",
              "legendFormat": "Size"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "fixed", "fixedColor": "blue"}
            }
          }
        },
        {
          "title": "Active queries by state",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count{job=\"postgres-exporter\",state=~\"active|idle|idle in transaction|fastpath function call\"}) by (state)",
              "legendFormat": "{{state}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Cache hit ratio evolution",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "(sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\"}[5m])) / (sum(rate(pg_stat_database_blks_hit{job=\"postgres-exporter\"}[5m])) + sum(rate(pg_stat_database_blks_read{job=\"postgres-exporter\"}[5m])))) * 100",
              "legendFormat": "Cache hit %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "red", "value": null},
                {"color": "orange", "value": 90},
                {"color": "green", "value": 99}
              ]}
            }
          }
        },
        {
          "title": "Commit vs Rollback",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_xact_commit{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "commits ({{datname}})"
            },
            {
              "expr": "sum(rate(pg_stat_database_xact_rollback{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "rollbacks ({{datname}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Read/Write throughput",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_tup_fetched{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "fetched ({{datname}})"
            },
            {
              "expr": "sum(rate(pg_stat_database_tup_returned{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "returned ({{datname}})"
            },
            {
              "expr": "sum(rate(pg_stat_database_tup_inserted{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "inserted ({{datname}})"
            },
            {
              "expr": "sum(rate(pg_stat_database_tup_updated{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "updated ({{datname}})"
            },
            {
              "expr": "sum(rate(pg_stat_database_tup_deleted{job=\"postgres-exporter\"}[5m])) by (datname)",
              "legendFormat": "deleted ({{datname}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "title": "Slow queries (Loki)",
          "type": "logs",
          "gridPos": {"x": 0, "y": 20, "w": 24, "h": 8},
          "targets": [
            {
              "expr": "{namespace=\"depfund\",container=\"postgres\"} |= \"duration\"",
              "legendFormat": "",
              "datasource": "Loki",
              "maxLines": 20
            }
          ],
          "datasource": "Loki"
        }
      ]
    }
